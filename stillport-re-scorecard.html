<script>
// Detect file:// protocol
if (window.location.protocol === 'file:') {
  document.getElementById('fileProtocolWarning').style.display = 'block';
  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginBtn').style.opacity = '0.4';
}

// ===== MSAL AUTH =====
const cloudConfig = {
  tenantId: '13dc13e3-f6f6-4c45-948d-baae80478dd4',
  clientId: '17511f86-ad7d-40a2-9978-01a08df6934b',
};

let msalInstance = null;
let currentUser = null;
let isCloudMode = false;
let msalToken = null;
const GRAPH_BASE = 'https://graph.microsoft.com/v1.0';
const SCORECARD_FOLDER = 'Stillport/RE Scorecards';

function initMSAL() {
  if (!cloudConfig.clientId || !cloudConfig.tenantId) return false;
  try {
    msalInstance = new msal.PublicClientApplication({
      auth: {
        clientId: cloudConfig.clientId,
        authority: `https://login.microsoftonline.com/${cloudConfig.tenantId}`,
        redirectUri: window.location.origin + window.location.pathname,
      },
      cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false },
    });
    return true;
  } catch (e) { console.error('MSAL init failed:', e); return false; }
}

async function handleLogin() {
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginLoading').style.display = 'block';
  document.getElementById('loginBtn').disabled = true;

  if (!initMSAL()) {
    document.getElementById('loginError').textContent = 'SSO not configured.';
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginLoading').style.display = 'none';
    document.getElementById('loginBtn').disabled = false;
    return;
  }

  try {
    const loginResp = await msalInstance.loginPopup({
      scopes: ['User.Read', 'Files.ReadWrite'],
    });
    currentUser = loginResp.account;
    isCloudMode = true;
    document.getElementById('loginOverlay').classList.add('hidden');
    renderApp();
  } catch (err) {
    console.error('Login failed:', err);
    document.getElementById('loginError').textContent = err.message || 'Login failed. Please try again.';
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginLoading').style.display = 'none';
    document.getElementById('loginBtn').disabled = false;
  }
}

function skipLogin() {
  isCloudMode = false;
  currentUser = null;
  document.getElementById('loginOverlay').classList.add('hidden');
  renderApp();
}

async function getToken() {
  if (!msalInstance || !currentUser) return null;
  try {
    const resp = await msalInstance.acquireTokenSilent({
      scopes: ['Files.ReadWrite'],
      account: currentUser,
    });
    return resp.accessToken;
  } catch (e) {
    try {
      const resp = await msalInstance.acquireTokenPopup({ scopes: ['Files.ReadWrite'] });
      return resp.accessToken;
    } catch (e2) { console.error('Token error:', e2); return null; }
  }
}

// OneDrive helpers
async function ensureFolder(token) {
  const parts = SCORECARD_FOLDER.split('/');
  let path = '';
  for (const part of parts) {
    path += '/' + part;
    try {
      await fetch(`${GRAPH_BASE}/me/drive/root:${path}`, {
        headers: { Authorization: `Bearer ${token}` }
      }).then(r => { if (!r.ok) throw r; });
    } catch {
      await fetch(`${GRAPH_BASE}/me/drive/root:${path.substring(0, path.lastIndexOf('/'))}:/children`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: part, folder: {}, '@microsoft.graph.conflictBehavior': 'replace' })
      });
    }
  }
}

async function saveScorecard(data, filename) {
  const token = await getToken();
  if (!token) return false;
  try {
    await ensureFolder(token);
    const path = `/${SCORECARD_FOLDER}/${filename}.json`;
    await fetch(`${GRAPH_BASE}/me/drive/root:${path}:/content`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    return true;
  } catch (e) { console.error('Save failed:', e); return false; }
}

async function listScorecards() {
  const token = await getToken();
  if (!token) return [];
  try {
    const resp = await fetch(`${GRAPH_BASE}/me/drive/root:/${SCORECARD_FOLDER}:/children?$select=name,lastModifiedDateTime,size&$orderby=lastModifiedDateTime desc`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!resp.ok) return [];
    const data = await resp.json();
    return (data.value || []).filter(f => f.name.endsWith('.json'));
  } catch { return []; }
}

async function loadScorecard(filename) {
  const token = await getToken();
  if (!token) return null;
  try {
    const resp = await fetch(`${GRAPH_BASE}/me/drive/root:/${SCORECARD_FOLDER}/${filename}:/content`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!resp.ok) return null;
    return await resp.json();
  } catch { return null; }
}

async function deleteScorecard(filename) {
  const token = await getToken();
  if (!token) return false;
  try {
    await fetch(`${GRAPH_BASE}/me/drive/root:/${SCORECARD_FOLDER}/${filename}`, {
      method: 'DELETE',
      headers: { Authorization: `Bearer ${token}` }
    });
    return true;
  } catch { return false; }
}

function renderApp() {
  // Expose globals for the React app
  window.__CLOUD_MODE = isCloudMode;
  window.__CURRENT_USER = currentUser;
  window.__saveScorecard = saveScorecard;
  window.__listScorecards = listScorecards;
  window.__loadScorecard = loadScorecard;
  window.__deleteScorecard = deleteScorecard;

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(window.StillportREScorecard));
}

// ─── Address-to-Market matcher ───
function matchAddressToMarket(address) {
  if (!address || address.length < 5) return null;
  const addr = address.toLowerCase().replace(/[,.\-]/g, " ").replace(/\s+/g, " ");
  const stateMatch = address.match(/\b([A-Z]{2})\b\s*\d{0,5}\s*$/);
  const addrState = stateMatch ? stateMatch[1] : null;

  let bestMatch = null;
  let bestScore = 0;

  for (const m of MARKETS) {
    const parts = m.n.split(",");
    const marketState = parts[parts.length - 1].trim();
    const marketTokens = parts[0].toLowerCase().replace(/[/\-()]/g, " ").replace(/\s+/g, " ").trim().split(" ").filter((t) => t.length > 2);

    let score = 0;
    if (addrState && marketState !== addrState) continue;
    for (const token of marketTokens) {
      if (addr.includes(token)) score += token.length;
    }
    if (score > bestScore) { bestScore = score; bestMatch = m; }
  }
  return bestScore >= 4 ? bestMatch : null;
}

// ─── Read file as base64 ───
function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ─── Claude API call (proxied through server) ───
async function callClaude(prompt, pdfBase64) {
  const content = [];
  if (pdfBase64) {
    content.push({ type: "document", source: { type: "base64", media_type: "application/pdf", data: pdfBase64 } });
  }
  content.push({ type: "text", text: prompt });

  const response = await fetch("/api/score", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-5-20250929", max_tokens: 4000, messages: [{ role: "user", content }] }),
  });
  if (!response.ok) { const err = await response.text(); throw new Error(`API ${response.status}: ${err.slice(0, 200)}`); }
  const data = await response.json();
  const jsonMatch = data.content[0].text.match(/\{[\s\S]*\}/);
  if (!jsonMatch) throw new Error("Could not parse AI response");
  return JSON.parse(jsonMatch[0]);
}

// ─── Qualification tier label ───
function getTierLabel(score, config) {
  if (!score || isNaN(score)) return { label: "\u2014", color: "#999" };
  if (score >= config.prime) return { label: "PRIME", color: GREEN };
  if (score >= config.strong) return { label: "STRONG", color: "#4CAF50" };
  if (score >= config.viable) return { label: "VIABLE", color: "#FF9800" };
  return { label: "PASS", color: RED };
}

  const cloudMode = window.__CLOUD_MODE;

  // Close market dropdown when clicking outside
  useEffect(() => {
    const handleClick = () => setShowMarketDropdown(false);
    if (showMarketDropdown) document.addEventListener("click", handleClick);
    return () => document.removeEventListener("click", handleClick);
  }, [showMarketDropdown]);

  // Auto-match address to market
  useEffect(() => {
    if (!propertyInfo.name || propertyInfo.name.length < 8) return;
    if (marketManuallySet) return;
    const timer = setTimeout(() => {
      const match = matchAddressToMarket(propertyInfo.name);
      if (match) {
        setMarketSearch(match.n);
        setPropertyInfo((prev) => ({ ...prev, market: match.n, marketComposite: String(match.c) }));
        if (match.t !== tier) {
          setTier(match.t);
          setScores({});
          setScoreSources({});
          setUploadedDocs([]);
        }
      }
    }, 600);
    return () => clearTimeout(timer);
  }, [propertyInfo.name]);

  const config = TIER_CONFIG[tier];
  const dimensions = DIMENSIONS[tier];

  // SF gate (T2 only)
  useEffect(() => {
    const ranges = SF_RANGES[tier];
    if (!ranges) { setSfGateResult(null); return; }
    const sf = parseFloat(propertyInfo.totalSF);
    const composite = parseFloat(propertyInfo.marketComposite);
    if (!sf || !composite) { setSfGateResult(null); return; }
    let matched = null;
    for (const r of ranges) { if (composite >= r.composite) { matched = r; break; } }
    if (!matched) setSfGateResult({ pass: false, reason: "Market composite too low for any SF range" });
    else if (sf >= matched.min && sf <= matched.max) setSfGateResult({ pass: true, reason: `${sf.toLocaleString()} SF within ${matched.label}` });
    else setSfGateResult({ pass: false, reason: `${sf.toLocaleString()} SF outside ${matched.label}` });
  }, [propertyInfo.totalSF, propertyInfo.marketComposite, tier]);

  // Scoring calculations
  const dimAverages = dimensions.map((dim) => {
    const vals = dim.criteria.map((c) => scores[c.id]).filter((v) => v != null && !isNaN(v));
    return vals.length > 0 ? vals.reduce((a, b) => a + b, 0) / vals.length : null;
  });
  const weightedComponents = dimAverages.map((avg, i) => avg != null ? avg * dimensions[i].weight : null);
  const scoredDimCount = weightedComponents.filter((v) => v != null).length;
  let compositeScore = null;
  if (scoredDimCount > 0) {

                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <span style={{ color: doc.color, fontSize: 16 }}>{doc.icon}</span>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600 }}>{doc.fileName}</div>
                    <div style={{ fontSize: 11, color: "#888" }}>{doc.docLabel} &bull; {doc.criteriaFilled} criteria filled &bull; {doc.timestamp}</div>
                  </div>
                </div>
                <button onClick={() => removeDoc(doc.id)}
                  style={{ background: "none", border: "1px solid #ddd", color: "#999", padding: "2px 8px", borderRadius: 4, fontSize: 11, cursor: "pointer" }}>
                  Remove
                </button>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Property Information */}
      <div style={{ background: "#fff", borderRadius: 8, padding: 20, marginBottom: 16, border: "1px solid #eee" }}>
        <h3 style={{ fontFamily: "Georgia, serif", color: DARK, fontSize: 15, margin: "0 0 16px", borderBottom: `2px solid ${GOLD}`, paddingBottom: 6 }}>Property Information</h3>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "12px 20px" }}>
          <div style={{ gridColumn: "1 / -1" }}>
            <label style={{ fontSize: 12, color: "#666", fontWeight: 600 }}>Property Name / Address</label>
            <input value={propertyInfo.name} onChange={(e) => handleInfo("name", e.target.value)}
              style={{ width: "100%", padding: 10, border: "1px solid #ddd", borderRadius: 4, fontSize: 14, marginTop: 4 }}
              placeholder="123 Main St, City, ST 00000" />
          </div>
          <div style={{ position: "relative" }}>
            <label style={{ fontSize: 12, color: "#666", fontWeight: 600 }}>Market</label>
            <input value={marketSearch} onChange={(e) => { setMarketSearch(e.target.value); setShowMarketDropdown(true); }}
              onFocus={() => setShowMarketDropdown(true)}
              style={{ width: "100%", padding: 10, border: "1px solid #ddd", borderRadius: 4, fontSize: 13, marginTop: 4 }}
              placeholder="Search markets..." />
            {showMarketDropdown && filteredMarkets.length > 0 && (
              <div onClick={(e) => e.stopPropagation()} style={{ position: "absolute", top: "100%", left: 0, right: 0, background: "#fff", border: "1px solid #ddd", borderRadius: 4, boxShadow: "0 4px 12px rgba(0,0,0,0.1)", zIndex: 10, maxHeight: 240, overflow: "auto" }}>
                {filteredMarkets.map((m) => (
                  <div key={m.n} onClick={() => {
                    setMarketSearch(m.n); handleInfo("market", m.n); handleInfo("marketComposite", String(m.c));
                    setMarketManuallySet(true); setShowMarketDropdown(false);
                    if (m.t !== tier) { setTier(m.t); setScores({}); setScoreSources({}); setUploadedDocs([]); }
                  }}
                  style={{ padding: "8px 12px", fontSize: 13, cursor: "pointer", borderBottom: "1px solid #f5f5f5", display: "flex", justifyContent: "space-between" }}>
                    <span>{m.n}</span>
                    <span style={{ color: m.t === "T1" ? T1_ACCENT : T2_ACCENT, fontWeight: 600, fontSize: 12 }}>{m.c} ({m.t})</span>
                  </div>
                ))}
              </div>
            )}
          </div>
          <div>
            <label style={{ fontSize: 12, color: "#666", fontWeight: 600 }}>Market Composite</label>
            <input value={propertyInfo.marketComposite} onChange={(e) => handleInfo("marketComposite", e.target.value)}
              style={{ width: "100%", padding: 10, border: "1px solid #ddd", borderRadius: 4, fontSize: 13, marginTop: 4, background: "#f9f9f9" }} readOnly />
          </div>
          {[
            { key: "buildingType", label: "Building Type", ph: "Retail, Office, etc." },
            { key: "totalSF", label: "Total SF", ph: "e.g. 8500" },
            { key: "yearBuilt", label: "Year Built", ph: "e.g. 1965" },
            { key: "askingPrice", label: "Asking Price", ph: "e.g. $2,400,000" },
            { key: "priceSF", label: "Price per SF", ph: "e.g. $282" },
            { key: "dateEvaluated", label: "Date Evaluated", ph: "" },
            { key: "evaluator", label: "Evaluator", ph: "Your name" },
          ].map((f) => (
            <div key={f.key}>
              <label style={{ fontSize: 12, color: "#666", fontWeight: 600 }}>{f.label}</label>
              <input value={propertyInfo[f.key]} onChange={(e) => handleInfo(f.key, e.target.value)}
                type={f.key === "dateEvaluated" ? "date" : "text"}
                style={{ width: "100%", padding: 10, border: "1px solid #ddd", borderRadius: 4, fontSize: 13, marginTop: 4 }}
                placeholder={f.ph} />
            </div>
          ))}
        </div>
      </div>

      {/* SF Range Gate */}
      {SF_RANGES[tier] && sfGateResult && (
        <div style={{
          background: sfGateResult.pass ? "#E8F5E9" : WARN_RED, borderRadius: 8, padding: 16, marginBottom: 16,
          border: `2px solid ${sfGateResult.pass ? GREEN : RED}`, display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ fontSize: 24, fontWeight: 700, color: sfGateResult.pass ? GREEN : RED }}>
            {sfGateResult.pass ? "\u2713" : "\u2717"}
          </span>
          <div>
            <div style={{ fontWeight: 700, color: sfGateResult.pass ? GREEN : RED, fontSize: 14 }}>
              SF Range Gate: {sfGateResult.pass ? "PASS" : "FAIL"}
            </div>
            <div style={{ fontSize: 12, color: "#666" }}>{sfGateResult.reason}</div>
          </div>
        </div>
      )}

      {/* Scoring Dimensions */}
      {dimensions.map((dim, di) => (
        <div key={dim.name} style={{ background: "#fff", borderRadius: 8, marginBottom: 8, border: "1px solid #eee", overflow: "hidden" }}>
          <div onClick={() => setExpandedDim(expandedDim === di ? null : di)}
            style={{ cursor: "pointer", padding: "14px 20px", display: "flex", justifyContent: "space-between", alignItems: "center",
              background: expandedDim === di ? config.accent : "#fff" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <span style={{ fontFamily: "Georgia, serif", fontSize: 14, fontWeight: 600,
                color: expandedDim === di ? GOLD : DARK }}>{dim.name}</span>
              <span style={{ fontSize: 11, color: expandedDim === di ? "rgba(255,255,255,0.4)" : "#aaa" }}>
                {Math.round(dim.weight * 100)}%
              </span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
              {dimAverages[di] != null && (
                <span style={{ fontWeight: 700, fontSize: 16, color: expandedDim === di ? GOLD : DARK }}>
                  {dimAverages[di].toFixed(2)}
                </span>
              )}
              <span style={{ color: expandedDim === di ? "rgba(255,255,255,0.5)" : "#aaa", fontSize: 12 }}>
                {dim.criteria.filter((c) => scores[c.id] != null).length}/{dim.criteria.length}
              </span>
              <span style={{ color: expandedDim === di ? "rgba(255,255,255,0.5)" : "#aaa" }}>{expandedDim === di ? "\u25B2" : "\u25BC"}</span>
            </div>
          </div>
          {expandedDim === di && (
            <div style={{ padding: "8px 0" }}>
              {dim.criteria.map((crit, ci) => (
                <div key={crit.id} style={{
                  padding: "10px 16px", background: ci % 2 === 0 ? LIGHT_GOLD : "#fff",
                  display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#333" }}>{crit.label}</div>
                    <div style={{ fontSize: 11, color: "#888", marginTop: 2 }}>{crit.guide}</div>
                    {scoreSources[crit.id] && (
                      <div style={{ fontSize: 10, color: scoreSources[crit.id].color, marginTop: 3, fontStyle: "italic" }}>
                        {scoreSources[crit.id].reasoning}
                      </div>
                    )}
                  </div>
                  <ScoreInput value={scores[crit.id]} onChange={(v) => handleScore(crit.id, v)}
                    binary={crit.binary} source={scoreSources[crit.id]} />
                </div>
              ))}
            </div>
          )}
        </div>
      ))}

      {/* Composite Score */}
      <div style={{ background: config.accent, borderRadius: 8, padding: 24, marginBottom: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 16 }}>
          <div>
            <div style={{ fontFamily: "Georgia, serif", color: "rgba(255,255,255,0.6)", fontSize: 13 }}>
              Weighted Composite Score{!allDimsScored && compositeScore != null ? ` (${scoredDimCount}/${dimensions.length} dimensions)` : ""}
            </div>
            <div style={{ fontFamily: "Georgia, serif", color: GOLD, fontSize: 42, fontWeight: 700, lineHeight: 1.1 }}>
              {compositeScore != null ? compositeScore.toFixed(2) : "\u2014"}
            </div>
            {!allDimsScored && compositeScore != null && (
              <div style={{ fontSize: 11, color: "#FF9800", marginTop: 2 }}>Preliminary \u2014 score remaining dimensions for final composite</div>
            )}
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>
              {scoredCount} of {totalCriteria} criteria scored
              {Object.keys(scoreSources).length > 0 && (
                <span> ({Object.keys(scoreSources).length} AI / {scoredCount - Object.keys(scoreSources).length} manual)</span>
              )}
            </div>
          </div>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontSize: 12, color: "rgba(255,255,255,0.5)", marginBottom: 4 }}>Qualification</div>
            <div style={{ fontSize: 28, fontWeight: 700, color: tierResult.color, fontFamily: "Georgia, serif", textShadow: "0 1px 4px rgba(0,0,0,0.3)" }}>
              {tierResult.label}
            </div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>
              Prime: {config.prime}+ | Strong: {config.strong}+ | Viable: {config.viable}+
            </div>
          </div>
        </div>
        {compositeScore != null && (
          <div style={{ marginTop: 16, borderTop: "1px solid rgba(255,255,255,0.1)", paddingTop: 12 }}>
            {dimensions.map((dim, i) => (
              <div key={dim.name} style={{ display: "flex", justifyContent: "space-between", padding: "3px 0", fontSize: 12 }}>
                <span style={{ color: "rgba(255,255,255,0.6)" }}>{dim.name} ({Math.round(dim.weight * 100)}%)</span>
                <span style={{ color: GOLD, fontWeight: 600 }}>
                  {dimAverages[i] != null ? dimAverages[i].toFixed(2) : "\u2014"} \u00D7 {dim.weight} = {weightedComponents[i] != null ? weightedComponents[i].toFixed(3) : "\u2014"}
                </span>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Download Buttons */}
      {compositeScore != null && (
        <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
          <button onClick={downloadExcel}
            style={{ flex: 1, padding: "14px 20px", borderRadius: 8, border: `2px solid ${GOLD}`, cursor: "pointer",
              background: "#fff", color: DARK, fontSize: 14, fontWeight: 600, fontFamily: "Georgia, serif",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
            Download Filled Scorecard (.xlsx)
          </button>
          <button onClick={downloadPdfBriefing} disabled={generatingPdf}
            style={{ flex: 1, padding: "14px 20px", borderRadius: 8, border: "none", cursor: generatingPdf ? "wait" : "pointer",
              background: `linear-gradient(135deg, ${config.accent}, ${DARK})`, color: GOLD,
              fontSize: 14, fontWeight: 600, fontFamily: "Georgia, serif",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
              opacity: generatingPdf ? 0.7 : 1 }}>
            {generatingPdf ? "Generating Briefing..." : "Download Strategy Briefing (.pdf)"}
          </button>
        </div>
      )}

      {/* Notes */}
      <div style={{ background: "#fff", borderRadius: 8, padding: 16, border: "1px solid #eee", marginBottom: 24 }}>
        <h3 style={{ fontFamily: "Georgia, serif", color: DARK, fontSize: 14, margin: "0 0 8px" }}>Notes & Observations</h3>
        <textarea value={notes} onChange={(e) => setNotes(e.target.value)} rows={4}
          style={{ width: "100%", padding: 10, border: "1px solid #ddd", borderRadius: 4, fontSize: 13, resize: "vertical", boxSizing: "border-box" }}
          placeholder="Additional notes about this property..." />
      </div>

      <div style={{ textAlign: "center", color: "#bbb", fontSize: 11, paddingBottom: 32 }}>
        Stillport Real Estate Selection Scorecard \u2014 {config.label}
      </div>
    </div>
  );
};
</script>
</body>
</html>
